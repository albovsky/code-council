# pnpm 9+ requires `packages:` even for single-package repos. Without
# this field, `pnpm store path --silent` (run by actions/setup-node's
# pnpm cache) fails with "packages field missing or empty" and CI
# never gets past dependency setup.
packages:
  - '.'

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
onlyBuiltDependencies:
  - better-sqlite3
