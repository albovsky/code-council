id: review-only
name: Review Only
description: |
  Paste a diff, draft, or text blob. Five reviewers (Codex + Gemini + Claude
  + opencode-go Kimi + opencode-go DeepSeek) critique it independently.
  Single pass — revise yourself and resubmit for another round.
author: chorus
agreementThreshold: 0.66
onThresholdMet: ask
maxRounds: 1
yoloDefault: false
# Lightest template — no doer phase, single reviewer-only ask. Cockpit-side floor.
estimatedBaselineTokens: 500

# Ship is meaningless without a doer diff. The runner skips it for any
# review-only template; the explicit `enabled: false` here keeps intent
# obvious to template-readers.
ship:
  enabled: false

phases:
  - id: review
    kind: review_only
    title: External Review
    description: Five lineages critique the supplied artifact independently.
    reviewer:
      require: 2
      crossLineage: true
      candidates:
        - lineage: openai
          models:
            - gpt-5.5
        - lineage: google
          models:
            - gemini-3.1-pro-preview
        - lineage: anthropic
          models:
            - claude-opus-4-7
        # opencode-go transports — kimi (moonshot lineage) routed via the
        # kimi shim's opencode-go path, deepseek via the opencode shim.
        # Adds two more independent voices on top of the cli-native trio.
        - lineage: moonshot
          models:
            - opencode-go/kimi-k2.6
        - lineage: opencode
          models:
            - opencode-go/deepseek-v4-pro
    artifact:
      label: "Artifact to review"
      hint: "Paste a unified diff, a markdown draft, code, or any text blob."
      maxBytes: 1048576
    inputs:
      include: []
      exclude: []
